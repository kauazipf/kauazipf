name: Generate Snake Neon

on:
  workflow_dispatch: # Permite rodar manualmente
  schedule:
    - cron: "0 0 * * *" # Roda todo dia à meia-noite UTC

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Fazer checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Gerar a cobrinha neon
      - name: Generate snake neon
        uses: Platane/snk@v3
        with:
          github_user_name: kauazipf
          color: "#ff79c6"
          background: "#282a36"
          pulse: true
          outputs: dist/github-contribution-grid-snake.svg

      # 3️⃣ Configurar Git para push
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 4️⃣ Criar ou atualizar branch 'output'
      - name: Create or update output branch
        run: |
          git fetch origin output || git checkout --orphan output
          git checkout -B output
          git rm -rf .
          cp -r dist/* .
          git add .
          git commit -m "Update Snake Neon"
          git push origin output --force
