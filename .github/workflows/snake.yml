name: Generate Snake Neon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Instalar dependências
      - name: Install dependencies
        run: |
          npm install
          npm install -g github-contribution-snake

      # 4️⃣ Gerar SVG real do Snake Neon
      - name: Generate Snake Neon SVG
        run: |
          snk --username kauazipf --output dist/github-contribution-grid-snake.svg

      # 5️⃣ Verificar se o SVG foi gerado corretamente
      - name: Verify SVG
        run: |
          if [ ! -s dist/github-contribution-grid-snake.svg ]; then
            echo "Error: SVG file was not generated or is empty."
            exit 1
          else
            echo "SVG generated successfully."
          fi

      # 6️⃣ Configurar Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 7️⃣ Criar ou alternar para branch 'output'
      - name: Create or switch to branch 'output'
        run: |
          git fetch origin output || true
          if git show-ref --verify --quiet refs/heads/output; then
            git checkout output
          else
            git checkout --orphan output
          fi

      # 8️⃣ Copiar SVG para o repositório raiz
      - name: Copy SVG
        run: |
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg

      # 9️⃣ Commit e push
      - name: Commit and push
        run: |
          git add github-contribution-grid-snake.svg
          git commit -m "Update Snake Neon" || echo "No changes to commit"
          git push origin output --force
