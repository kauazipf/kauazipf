name: Generate Snake Neon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Rodar todo dia à meia-noite UTC

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2️⃣ Instalar github-contribution-snake globalmente
      - name: Install github-contribution-snake globally
        run: |
          npm install -g github-contribution-snake

      # 3️⃣ Gerar SVG real do Snake Neon
      - name: Generate Snake Neon SVG
        run: |
          mkdir -p dist
          snk --username kauazipf --output dist/github-contribution-grid-snake.svg

      # 4️⃣ Verificar se o SVG foi gerado corretamente
      - name: Verify SVG
        run: |
          if [ ! -s dist/github-contribution-grid-snake.svg ]; then
            echo "Error: SVG file was not generated or is empty."
            exit 1
          else
            echo "SVG generated successfully."
          fi

      # 5️⃣ Configurar Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 6️⃣ Criar ou alternar para branch 'output'
      - name: Create or switch to branch 'output'
        run: |
          git fetch origin output || true
          if git show-ref --verify --quiet refs/heads/output; then
            git checkout output
          else
            git checkout --orphan output
          fi

      # 7️⃣ Copiar SVG para o repositório raiz
      - name: Copy SVG
        run: |
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg

      # 8️⃣ Commit e push
      - name: Commit and push
        run: |
          git add github-contribution-grid-snake.svg
          git commit -m "Update Snake Neon" || echo "No changes to commit"
          git push origin output --force
