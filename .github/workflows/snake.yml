name: Generate Snake Neon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Executa todo dia à meia-noite UTC

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Gerar SVG do Snake Neon usando Platane/snk
      - name: Generate Snake Neon SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          svg_out_path: dist/github-contribution-grid-snake.svg

      # 3️⃣ Configurar Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 4️⃣ Criar ou alternar para branch 'output'
      - name: Create or switch to branch 'output'
        run: |
          git fetch origin output || true
          if git show-ref --verify --quiet refs/heads/output; then
            git checkout output
          else
            git checkout --orphan output
          fi

      # 5️⃣ Copiar SVG para a raiz do repositório
      - name: Copy SVG
        run: |
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg

      # 6️⃣ Commit e push
      - name: Commit and push
        run: |
          git add github-contribution-grid-snake.svg
          git commit -m "Update Snake Neon" || echo "No changes to commit"
          git push origin output --force
