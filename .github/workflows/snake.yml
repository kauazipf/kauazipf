name: Generate Snake Neon

on:
  workflow_dispatch: # Rodar manualmente
  schedule:
    - cron: "0 0 * * *" # Todo dia à meia-noite UTC

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout completo do repositório
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # necessário para criar/atualizar branches

      # 2️⃣ Gerar a cobrinha neon
      - name: Generate snake neon
        uses: Platane/snk@v3
        with:
          github_user_name: kauazipf
          color: "#ff79c6"
          background: "#282a36"
          pulse: true
          outputs: dist/github-contribution-grid-snake.svg

      # 3️⃣ Configurar Git
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 4️⃣ Criar ou atualizar branch 'output'
      - name: Create or update output branch
        run: |
          # Se a branch output existir, usar ela; senão criar orphan
          if git ls-remote --exit-code --heads origin output; then
            git checkout output
          else
            git checkout --orphan output
          fi

          # Limpar arquivos antigos
          git rm -rf . || echo "Nada para remover"

          # Copiar arquivo gerado
          mkdir -p .  # garante que o diretório exista
          cp -r dist/* .

          # Commit e push
          git add .
          git commit -m "Update Snake Neon" || echo "Nada para commitar"
          git push origin output --force
