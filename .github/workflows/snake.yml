name: Generate Snake Neon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Generate Snake Neon SVGs
        run: |
          mkdir -p dist
          echo "<svg>Snake Neon</svg>" > dist/github-contribution-grid-snake.svg

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to branch 'output'
        run: |
          git fetch origin output || true
          if git show-ref --verify --quiet refs/heads/output; then
            git checkout output
          else
            git checkout --orphan output

      - name: Update Snake image in README
        run: |
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          # Substitui apenas a linha com o <img> do Snake
          sed -i "s|<img src=\".*github-contribution-grid-snake.svg\".*>|<img src='https://github.com/kauazipf/kauazipf/raw/output/github-contribution-grid-snake.svg' alt='snake neon animation' />|" README.md

      - name: Commit and push
        run: |
          git add github-contribution-grid-snake.svg README.md
          git commit -m "Update Snake Neon" || echo "No changes to commit"
          git push origin output --force
