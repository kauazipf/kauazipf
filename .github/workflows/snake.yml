name: Generate Snake Neon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Executa todo dia à meia-noite UTC

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Gerar SVG do Snake Neon usando a Action oficial
      - name: Generate Snake Neon
        uses: platane/snk-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_branch: output
          output_file: github-contribution-grid-snake.svg
          username: ${{ github.repository_owner }}
